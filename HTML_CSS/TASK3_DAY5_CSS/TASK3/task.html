<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Squid Game</title>

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <!-- CSS -->

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- MAIN CONTAINER -->

  <div class="container">

    <!-- NAVBAR -->

    <nav class="navbar">

      <!-- LOGO -->

      <div class="logo">

        <h1>SQUID <br> GAME</h1>

      </div>

      <!-- MENU -->

      <ul class="menu">

        <li>About</li>
        <li class="active">Watch now</li>
        <li>Actors</li>
        <li>Contact</li>

      </ul>

      <!-- MENU ICON -->

      <div class="menu-icon">

        <i class="fa-solid fa-bars"></i>

      </div>

    </nav>

    <!-- HERO SECTION -->

    <section class="hero">

      <!-- LEFT CONTENT -->

      <div class="left-content">

        <h1>
          SQUID <br>
          GAME
        </h1>

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br>
          Season 1: 9 Episodes
        </p>

        <!-- BUTTONS -->

        <div class="buttons">

          <button class="play-btn">

            <i class="fa-solid fa-play"></i>
            Play Now

          </button>

          <button class="trailer-btn">

            <i class="fa-solid fa-play"></i>
            Watch Trailer

          </button>

        </div>

      </div>

      <!-- CENTER IMAGE -->

      <div class="center-image">

        <img
  src="https://images.unsplash.com/photo-1646233875749-d8f8f359ae71?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8c3F1aWQlMjBnYW1lfGVufDB8fDB8fHww"
  alt="squid"
/>

      </div>

      <!-- RIGHT SOCIAL -->

      <div class="social-icons">

        <i class="fa-brands fa-twitter"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-facebook-f"></i>

      </div>

      <!-- SCROLL -->

      <div class="scroll-text">

        SCROLL

      </div>

    </section>

    <!-- CARDS -->

    <section class="cards">

      <!-- CARD -->

      <div class="card">

        <img
  src="./card1.jpg.jfif"
  alt=""
/>

        <div class="play-circle">

          <i class="fa-solid fa-play"></i>

        </div>

      </div>

      <!-- CARD -->

      <div class="card">

        <img
          src="https://images.unsplash.com/photo-1668467209249-026b2ccb3824?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fHNxdWlkJTIwZ2FtZXN8ZW58MHx8MHx8fDA%3D"
          alt=""
        />

        <div class="play-circle">

          <i class="fa-solid fa-play"></i>

        </div>

      </div>

      <!-- CARD -->

      <div class="card">

        <img
          src="https://images.unsplash.com/photo-1705770581857-8000ec4038f7?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fHNxdWlkJTIwZ2FtZXN8ZW58MHx8MHx8fDA%3D"
          alt=""
        />

        <div class="play-circle">

          <i class="fa-solid fa-play"></i>

        </div>

      </div>

    </section>

  </div>

</body>
</html>
