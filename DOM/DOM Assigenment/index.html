<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Task Manager</h1>

    <div class="add-task">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter Task"
        >

        <select id="category">

            <option value="Study">
                Study
            </option>

            <option value="Work">
                Work
            </option>

            <option value="Personal">
                Personal
            </option>

        </select>

        <button id="addBtn">
            Add Task
        </button>

    </div>

    <hr>

    <h2>Task List</h2>

    <div id="taskContainer">

    </div>

    <hr>

    <h2>Attributes vs Properties</h2>

    <input
        type="text"
        id="demoInput"
        value="Hello"
    >

    <button id="showDiff">
        Show Difference
    </button>

    <p id="result">

    </p>

    <hr>

    <h2>Event Propagation</h2>

    <div id="grandparent" class="box">

        Grandparent

        <div id="parent" class="box">

            Parent

            <button id="child">
                Child
            </button>

        </div>

    </div>

    <hr>

    <h2>Browser Rendering Pipeline</h2>

    <ol>

        <li>HTML Parsing</li>

        <li>DOM Tree Creation</li>

        <li>CSS Parsing</li>

        <li>CSSOM Tree Creation</li>

        <li>Render Tree</li>

        <li>Layout</li>

        <li>Paint</li>

        <li>Composite</li>

    </ol>

    <script src="script.js"></script>

</body>
</html>
